# SonarQube / SonarCloud project configuration
# Run: sonar-scanner (or configure in CI)

sonar.projectKey=node-basic-app
sonar.projectName=Node Basic App

# Sources and tests
sonar.sources=.
sonar.tests=tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js

# Test file pattern
sonar.test.inclusions=**/*.test.js

# Duplication (no exclusions - intentional dupes for testing)
