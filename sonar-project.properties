# SonarQube / SonarCloud - ensure Security, Duplication, Vulnerabilities are reported
# Run: sonar-scanner

sonar.projectKey=node-basic-app
sonar.projectName=Node Basic App

# Explicit source directories (so JavaScript is analyzed)
sonar.sources=app.js,routes,utils,sonar-demo-issues.js
sonar.tests=tests

# Include all JS in sources (no exclusion of utils/routes)
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js,**/public/**,**/views/**

# Test inclusions
sonar.test.inclusions=**/*.test.js

# Coverage (run: npm test first)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
